<app-header></app-header>

<ion-content class="edit-character-page" fullscreen>
 @if(personaje) { 
  <div class="form-container" >
    <ion-card class="edit-card">
      <ion-card-content>
        <h2>Editar Personaje</h2>
        <ion-item>
          <ion-label position="floating">Nombre</ion-label>
          <ion-input [(ngModel)]="personaje.name" value="{{personaje.name}}"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Especie</ion-label>
          <ion-input [(ngModel)]="personaje.species" value="{{personaje.species}}"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Estado</ion-label>
          <ion-input [(ngModel)]="personaje.status" value="{{personaje.status}}"></ion-input>
        </ion-item>


        <ion-item>
          <ion-label position="floating">Género</ion-label>
          <ion-input [(ngModel)]="personaje.gender" value="{{personaje.gender}}"></ion-input>
        </ion-item>


        <div class="button-group">
          <ion-button expand="block" color="success" (click)="guardarCambios()">
            Guardar
          </ion-button>
          <ion-button expand="block" color="success" (click)="cancelar()">
            Cancelar
          </ion-button>
        </div>

      </ion-card-content>
    </ion-card>

  </div>
}
</ion-content>
