<div class="contenedor-tarjetas">
<ion-card class="card" *ngFor="let personaje of personajes" (click)="navigateCharacter(personaje.id)" >
  <img alt="Personaje de Rick y Morty" [src]= "personaje.image" />
  <ion-card-header>
    <ion-card-title>{{personaje.name}}</ion-card-title>
    <ion-card-subtitle>{{personaje.gender}}</ion-card-subtitle>
  </ion-card-header>

  <ion-card-content>
    <ul>
      <li><strong>Especie: </strong> {{personaje.species}}</li>
      <li><strong>Estado: </strong>{{personaje.status}}</li>
      <li><strong>Localización: </strong>{{personaje.location.name}}</li>
    </ul>
  </ion-card-content>
</ion-card>
</div>
